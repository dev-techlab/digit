<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Digit Link Login</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Inter', sans-serif; }
    .bg-grad {
      background: linear-gradient(135deg, #6f7df7 0%, #7a61e0 55%, #8a55bc 100%);
    }
    .soft-circle {
      background: rgba(255,255,255,0.12);
      backdrop-filter: blur(2px);
    }
  </style>
</head>
<body class="bg-grad">
  <div class="relative min-h-dvh w-full flex items-center justify-center px-4 py-4 sm:py-6 overflow-x-hidden">
    
    <div class="absolute top-10 left-10 w-28 h-28 sm:w-40 sm:h-40 rounded-full soft-circle"></div>
    <div class="absolute bottom-36 left-10 sm:left-24 w-14 h-14 sm:w-20 sm:h-20 rounded-full soft-circle"></div>
    <div class="absolute top-1/3 right-6 sm:right-16 w-20 h-20 sm:w-28 sm:h-28 rounded-full soft-circle"></div>
    <div class="absolute bottom-16 right-10 sm:right-32 w-16 h-16 sm:w-24 sm:h-24 rounded-full soft-circle"></div>

    <div class="w-full max-w-[440px] bg-white/95 rounded-[24px] sm:rounded-[28px] shadow-[0_25px_70px_rgba(60,30,120,0.28)] p-6 sm:p-8 relative z-10 my-6">
      <div class="flex justify-center">
        <div class="w-14 h-14 rounded-2xl bg-gradient-to-br from-green-400 to-emerald-500 flex items-center justify-center shadow-lg">
          <span class="text-white text-3xl font-semibold">D</span>
        </div>
      </div>

      <div class="text-center mt-4">
        <h1 class="text-2xl sm:text-3xl font-extrabold text-slate-700">Digit Link</h1>
        <p class="mt-1 text-sm sm:text-base text-slate-500">Welcome Back, Please Login</p>
      </div>

      <form class="mt-4 sm:mt-6" id="loginForm" novalidate>
        <div class="space-y-3">
          <div>
            <div id="usernameField" class="flex items-center gap-3 rounded-2xl border-2 border-slate-200 bg-white p-2 sm:py-3 shadow-sm focus-within:border-blue-400 transition">
              <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5 text-slate-400 flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
                <path stroke-linecap="round" stroke-linejoin="round" d="M15 19.128a9 9 0 10-6 0M12 12a4 4 0 100-8 4 4 0 000 8z" />
              </svg>
              <input
                type="text"
                id="username"
                placeholder="Username"
                class="w-full outline-none text-sm sm:text-base placeholder:text-slate-400 text-slate-700 bg-transparent"
              />
            </div>
            <p id="usernameError" class="mt-1 text-xs text-red-400 hidden">Please enter Username</p>
          </div>

          <div>
            <div id="passwordField" class="flex items-center gap-3 rounded-2xl border-2 border-slate-200 bg-white p-2 sm:py-3 shadow-sm focus-within:border-blue-400 transition">
              <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5 text-slate-400 flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
                <path stroke-linecap="round" stroke-linejoin="round" d="M16 11V7a4 4 0 10-8 0v4m-2 0h12a2 2 0 012 2v6a2 2 0 01-2 2H6a2 2 0 01-2-2v-6a2 2 0 012-2z" />
              </svg>
              <input
                type="password"
                id="password"
                placeholder="Password"
                class="w-full outline-none text-sm sm:text-base placeholder:text-slate-400 text-slate-700 bg-transparent"
              />
            </div>
            <p id="passwordError" class="mt-1 text-xs text-red-400 hidden">Please enter Password</p>
          </div>
        </div>

        <div class="flex justify-end mt-2">
          <a href="forgot-password.html" class="text-blue-500 font-semibold text-xs sm:text-sm hover:underline">Reset password?</a>
        </div>

        <button
          type="submit"
          class="mt-3 w-full rounded-2xl py-2 sm:py-3 text-white text-base sm:text-lg font-bold shadow-lg bg-gradient-to-r from-indigo-500 to-purple-600 hover:from-indigo-600 hover:to-purple-700 transition"
        >
          Login
        </button>
      </form>

      <script>
        const form = document.getElementById('loginForm');
        const username = document.getElementById('username');
        const password = document.getElementById('password');
        const usernameField = document.getElementById('usernameField');
        const passwordField = document.getElementById('passwordField');
        const usernameError = document.getElementById('usernameError');
        const passwordError = document.getElementById('passwordError');

        function setFieldState(input, field, error, isValid) {
          field.classList.toggle('border-red-300', !isValid);
          field.classList.toggle('border-slate-200', isValid);
          error.classList.toggle('hidden', isValid);
        }

        function validateField(input, field, error) {
          const isValid = input.value.trim().length > 0;
          setFieldState(input, field, error, isValid);
          return isValid;
        }

        username.addEventListener('input', () => validateField(username, usernameField, usernameError));
        password.addEventListener('input', () => validateField(password, passwordField, passwordError));

        form.addEventListener('submit', (e) => {
          e.preventDefault();
          const isUsernameValid = validateField(username, usernameField, usernameError);
          const isPasswordValid = validateField(password, passwordField, passwordError);
          if (isUsernameValid && isPasswordValid) {
            form.submit();
          }
        });
      </script>
    </div>

    <div class="absolute bottom-3 left-0 right-0 text-center text-white/85 text-xs sm:text-sm px-4">
      Copyright © 2025 All Rights Reserved.
    </div>
  </div>
</body>
</html>
